name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  XCODE_VERSION: '15'
  SCHEME: 'PhoneCare'
  CONFIGURATION: 'Release'
  DERIVED_DATA_PATH: 'build'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build PhoneCare archive
        run: |
          xcodebuild -project PhoneCare.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
            -archivePath "build/PhoneCare.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tee build.log

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/PhoneCare.xcarchive" \
            -exportOptionsPlist "tools/ExportOptions.plist" \
            -exportPath "build/Release" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee export.log
          ls -lah build/Release/

      - name: Upload to TestFlight
        if: success()
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Create temporary App Store Connect API key file
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey.p8
          
          # Find IPA
          IPA_FILE=$(find build/Release -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "❌ IPA not found!"
            exit 1
          fi
          
          echo "🚀 Uploading $IPA_FILE to TestFlight..."
          
          # Use xcrun altool or transporter (if available)
          # For now, we'll use a placeholder message that documents the flow
          echo "✅ Build artifact ready for TestFlight upload"
          echo "📦 IPA: $IPA_FILE"
          ls -lh "$IPA_FILE"

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ PhoneCare build PASSED"
            exit 0
          else
            echo "❌ PhoneCare build FAILED"
            exit 1
          fi
