name: PhoneCare
options:
  bundleIdPrefix: com.phonecare
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    INFOPLIST_KEY_CFBundleDisplayName: "PhoneCare"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"

targets:
  PhoneCare:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhoneCare
        excludes:
          - "**/*.storekit"
    resources:
      - path: PhoneCare/Resources/Assets.xcassets
      - path: PhoneCare/Resources/StoreKit/Products.storekit
      - path: PhoneCare/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PhoneCare needs access to your photos to find duplicates and help you free up space."
        INFOPLIST_KEY_NSContactsUsageDescription: "PhoneCare needs access to your contacts to find and merge duplicates."
        INFOPLIST_KEY_NSCameraUsageDescription: "PhoneCare checks your camera permission status to help you understand which apps can access your camera."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "PhoneCare checks your microphone permission status to help you understand which apps can access your microphone."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "PhoneCare checks your location permission status as part of your privacy audit."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "PhoneCare checks your calendar permission status as part of your privacy audit."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "PhoneCare checks your reminders permission status as part of your privacy audit."
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "PhoneCare checks your Bluetooth permission status as part of your privacy audit."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "PhoneCare checks your health data permission status as part of your privacy audit."
        INFOPLIST_KEY_NSUserTrackingUsageDescription: "PhoneCare checks your tracking permission status to help you understand which apps can track your activity."
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"

  PhoneCareTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhoneCareTests
    dependencies:
      - target: PhoneCare
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PhoneCare.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PhoneCare"

  PhoneCareUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhoneCareUITests
    dependencies:
      - target: PhoneCare
