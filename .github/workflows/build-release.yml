name: Build & Release (Private → Public)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      public_repo:
        description: 'Public release repo (owner/repo)'
        required: true
        default: 'pyroforbes/phone-care-releases'

env:
  XCODE_VERSION: '15'
  SCHEME: 'PhoneCare'
  CONFIGURATION: 'Release'
  DERIVED_DATA_PATH: 'build'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build PhoneCare
        run: |
          xcodebuild -project PhoneCare.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
            -archivePath "build/PhoneCare.xcarchive" \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/PhoneCare.xcarchive" \
            -exportOptionsPlist "tools/ExportOptions.plist" \
            -exportPath "build/Release"
          ls -lah build/Release/

      - name: Encode artifact for transit
        run: |
          IPA_FILE=$(find build/Release -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_FILE" ]; then echo "IPA not found!"; exit 1; fi
          base64 -i "$IPA_FILE" -o build/PhoneCare.ipa.b64
          echo "IPA_FILE=$IPA_FILE" >> $GITHUB_ENV
          echo "BUILD_TAG=$(git describe --tags --always)" >> $GITHUB_ENV

      - name: Create PR in public repo
        env:
          PUBLIC_REPO: ${{ github.event.inputs.public_repo || 'pyroforbes/phone-care-releases' }}
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          set -e
          BRANCH="release/${{ env.BUILD_TAG }}-${{ github.run_id }}"
          git clone --depth 1 "https://github.com/$PUBLIC_REPO.git" /tmp/release-repo
          cd /tmp/release-repo
          git config user.email "release-bot@phonecare.app"
          git config user.name "PhoneCare Release Bot"
          git checkout -b "$BRANCH"
          
          # Copy base64-encoded artifact
          mkdir -p artifacts
          cp build/PhoneCare.ipa.b64 /tmp/release-repo/artifacts/
          
          # Add build metadata
          cat > /tmp/release-repo/BUILD_META.txt <<EOF
          Build Tag: ${{ env.BUILD_TAG }}
          Built: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          
          git add .
          git commit -m "Release: ${{ env.BUILD_TAG }} from ${{ github.repository }}"
          git push -u origin "$BRANCH"
          
          # Open PR
          gh pr create \
            --title "Release: ${{ env.BUILD_TAG }}" \
            --body "Compiled artifact from private repo build ${{ github.run_id }}" \
            --base main \
            --head "$BRANCH"
          
          echo "BUILD_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "PUBLIC_REPO=$PUBLIC_REPO" >> $GITHUB_ENV

      - name: Post build status to private repo
        if: always()
        run: |
          echo "✅ Build completed: ${{ job.status }}"
          echo "📦 Artifact: ${{ env.IPA_FILE }}"
          echo "🔗 Public Repo: https://github.com/${{ env.PUBLIC_REPO }}"
          echo "🌿 Branch: ${{ env.BUILD_BRANCH }}"
